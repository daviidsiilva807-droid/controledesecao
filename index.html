<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrada - Controle de seção</title>
</head>
<body>
  <div class="container">
    <h1>Bem-vindo ao Controle de seção</h1>
    <h2>Entrada do Sistema</h2>

    <input type="text" id="login" placeholder="Digite seu login">
    <input type="password" id="senha" placeholder="Digite sua senha">
    <button type="button" onclick="entrar()">Entrar</button>
  </div>

  <script src="auth-db.js"></script>
  <script>
    AuthDB.garantirAdminPadrao();

    const sessaoAtual = AuthDB.obterSessao();
    if (sessaoAtual) {
      window.location.href = "dashboard.html";
    }

    function entrar() {
      const login = document.getElementById("login").value.trim();
      const senha = document.getElementById("senha").value;

      if (login === "" || senha.trim() === "") {
        alert("Por favor, preencha login e senha.");
        return;
      }

      const resultado = AuthDB.autenticar(login, senha);
      if (!resultado.ok) {
        alert(resultado.mensagem);
        return;
      }

      window.location.href = "dashboard.html";
    }
  </script>
</body>
</html>
